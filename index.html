<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FeedTile</title>
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <script src="https://unpkg.com/@mozilla/readability/Readability.js"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
    if (localStorage.getItem('feedtile_theme') === 'light' || (!('feedtile_theme' in localStorage) && !window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.remove('dark');
    } else {
      document.documentElement.classList.add('dark');
    }
  </script>
  <style>
    .tile { transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .tile:active { transform: scale(0.98); }
    .read { opacity: 0.6; filter: grayscale(30%); border-color: #e2e8f0; background-color: #f8fafc; box-shadow: none; }
    .read h3 { color: #64748b; }
    .dark .read { opacity: 0.5; filter: grayscale(40%); border-color: #1e293b; background-color: #0f172a80; }
    .dark .read h3 { color: #94a3b8; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    .prose img { border-radius: 0.75rem; max-width: 100%; height: auto; margin-left: auto; margin-right: auto; }
    
    /* Fade animation for newly loaded content */
    .fade-in { animation: fadeIn 0.5s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 font-sans min-h-screen flex flex-col transition-colors duration-300">

  <header class="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 sticky top-0 z-20 shadow-sm dark:shadow-md transition-colors duration-300">
    <div class="p-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold flex items-center gap-2 text-blue-600 dark:text-blue-400 cursor-pointer" onclick="filterCategory('All')">
        <img src="icon.svg" class="w-8 h-8 rounded shadow-sm" alt="Logo"> FeedTile
      </h1>
      
      <div class="flex gap-2">
        <button onclick="openSettings()" class="p-2 text-slate-600 bg-slate-100 hover:bg-slate-200 dark:text-slate-300 dark:bg-slate-700 dark:hover:bg-slate-600 rounded-lg transition">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
        </button>
        <button onclick="toggleMenu()" class="p-2 text-slate-600 bg-slate-100 hover:bg-slate-200 dark:text-slate-300 dark:bg-slate-700 dark:hover:bg-slate-600 rounded-lg transition">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
        </button>
      </div>
    </div>

    <div id="addFeedSection" class="hidden px-4 pb-4 bg-slate-50 dark:bg-slate-800 border-t border-slate-200 dark:border-slate-700 pt-4 transition-colors">
      <h2 class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-3">Add a New Source</h2>
      <div class="flex flex-col md:flex-row gap-3">
        <input type="url" id="feedUrl" placeholder="Website URL (e.g., theverge.com)" class="flex-1 p-3 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-slate-900 dark:text-white placeholder-slate-400 focus:ring-2 focus:ring-blue-500 focus:outline-none">
        <input type="text" id="feedCategory" placeholder="Category (e.g., Tech)" class="w-full md:w-48 p-3 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-slate-900 dark:text-white placeholder-slate-400 focus:ring-2 focus:ring-blue-500 focus:outline-none">
        <button onclick="addFeed()" class="bg-blue-600 text-white p-3 rounded-lg text-sm font-bold hover:bg-blue-700 dark:hover:bg-blue-500 transition shadow-sm">Save Feed</button>
      </div>
    </div>
  </header>

  <main class="flex-1 p-4 md:p-6 lg:p-8 h-full overflow-y-auto w-full max-w-7xl mx-auto">
    <div class="mb-2 flex gap-3 overflow-x-auto pt-3 pb-2 px-1 scrollbar-hide" id="categoryBadges"></div>

    <div class="mb-6 px-1 flex items-center justify-between">
      <select id="sourceFilterDropdown" onchange="filterSource(this.value)" class="w-full sm:w-64 p-2 text-sm font-semibold bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 focus:outline-none text-slate-700 dark:text-slate-300 cursor-pointer appearance-none hidden"></select>
    </div>

    <div id="feedContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6"></div>
  </main>

  <div id="readerModal" class="hidden fixed inset-0 bg-white dark:bg-slate-900 z-[60] flex-col overflow-hidden transition-colors duration-300">
    <header class="flex justify-between items-center p-3 sm:p-4 border-b border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/90 backdrop-blur-md sticky top-0 z-10">
      <button onclick="closeReader()" class="flex items-center gap-1 p-2 text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-white bg-white dark:bg-slate-800 rounded-full shadow-sm border border-slate-200 dark:border-slate-700 transition">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
      </button>
      
      <div class="flex gap-2">
        <button id="readerSaveBtn" class="flex items-center gap-2 p-2 px-4 text-sm font-bold text-slate-600 bg-white hover:bg-slate-100 dark:text-slate-300 dark:bg-slate-800 dark:hover:bg-slate-700 rounded-full shadow-sm border border-slate-200 dark:border-slate-700 transition">
          <span id="readerSaveIcon">☆</span> Save
        </button>
        <a id="readerExternalLink" href="#" target="_blank" class="flex items-center p-2 text-blue-600 bg-blue-50 hover:bg-blue-100 dark:text-blue-400 dark:bg-blue-900/30 dark:hover:bg-blue-900/50 rounded-full transition">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
        </a>
      </div>
    </header>

    <div class="flex-1 overflow-y-auto p-5 sm:p-10 pb-32" id="readerScrollArea">
      <div class="max-w-2xl mx-auto">
        <div class="flex items-center gap-3 mb-6">
          <img id="readerLogo" src="" alt="logo" class="w-8 h-8 rounded-full bg-slate-100 object-contain">
          <div>
            <div id="readerSiteName" class="text-sm font-bold text-blue-600 dark:text-blue-400"></div>
            <div id="readerDate" class="text-xs font-medium text-slate-400 dark:text-slate-500"></div>
          </div>
        </div>
        <h1 id="readerTitle" class="text-3xl sm:text-4xl font-extrabold text-slate-900 dark:text-slate-100 leading-tight mb-8"></h1>
        
        <div id="readerLoadingPill" class="hidden items-center gap-2 mb-6 px-4 py-2 bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 text-sm font-bold rounded-full w-max">
          <svg class="animate-spin h-4 w-4 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
          Extracting full article...
        </div>

        <article id="readerContent" class="prose prose-lg prose-slate dark:prose-invert max-w-none text-slate-800 dark:text-slate-300 leading-relaxed"></article>
        
        <div id="readerFooter" class="mt-12 pt-8 border-t border-slate-200 dark:border-slate-800 text-center hidden">
          <p class="text-slate-500 dark:text-slate-400 mb-4 text-sm">We couldn't automatically extract the full text.</p>
          <a id="readerFooterLink" href="#" target="_blank" class="inline-block px-6 py-3 bg-blue-600 text-white font-bold rounded-lg shadow-md hover:bg-blue-500 transition">Read on Original Website</a>
        </div>
      </div>
    </div>
  </div>

  <div id="settingsModal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex justify-center items-end sm:items-center">
    <div class="bg-white dark:bg-slate-800 w-full sm:w-[450px] sm:rounded-2xl rounded-t-2xl max-h-[85vh] flex flex-col shadow-2xl transition-colors duration-300">
      <div class="p-4 border-b border-slate-200 dark:border-slate-700 flex justify-between items-center">
        <h2 class="text-xl font-bold text-slate-800 dark:text-white">Settings</h2>
        <button onclick="closeSettings()" class="p-2 text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-white bg-slate-100 dark:bg-slate-700 rounded-full">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
      </div>
      <div class="p-6 overflow-y-auto flex-1">
        <div class="mb-8 bg-slate-50 dark:bg-slate-900/50 p-4 rounded-xl border border-slate-200 dark:border-slate-700 flex justify-between items-center">
          <div>
            <h3 class="font-bold text-slate-800 dark:text-white">Appearance</h3>
            <p class="text-xs text-slate-500 dark:text-slate-400">Toggle light and dark mode</p>
          </div>
          <button onclick="toggleTheme()" class="bg-slate-200 dark:bg-slate-700 p-2 rounded-lg flex gap-2 items-center transition-colors">
            <span id="themeIcon" class="text-xl">🌙</span>
            <span id="themeText" class="text-sm font-bold text-slate-700 dark:text-slate-200">Dark</span>
          </button>
        </div>
        <div>
          <h3 class="font-bold text-slate-800 dark:text-white mb-1">Your Sources</h3>
          <p class="text-xs text-slate-500 dark:text-slate-400 mb-4">Manage the websites you track</p>
          <ul id="settingsFeedList" class="space-y-3"></ul>
        </div>
      </div>
    </div>
  </div>

  <script>
    const PROXY_URL = 'https://feedtile.ewing-jacob.workers.dev/?url=';
    
    let feeds = JSON.parse(localStorage.getItem('feedtile_feeds')) || [];
    let readArticles = JSON.parse(localStorage.getItem('feedtile_read')) || [];
    let savedArticles = JSON.parse(localStorage.getItem('feedtile_saved')) || []; 
    let globalStories = []; 
    let currentFilter = 'All'; 
    let currentSourceFilter = 'All'; 

    const colorPalette = [
      'bg-blue-50 text-blue-600 border-blue-200 dark:bg-blue-900/40 dark:text-blue-400 dark:border-blue-800/50',
      'bg-emerald-50 text-emerald-600 border-emerald-200 dark:bg-emerald-900/40 dark:text-emerald-400 dark:border-emerald-800/50',
      'bg-purple-50 text-purple-600 border-purple-200 dark:bg-purple-900/40 dark:text-purple-400 dark:border-purple-800/50',
      'bg-amber-50 text-amber-600 border-amber-200 dark:bg-amber-900/40 dark:text-amber-400 dark:border-amber-800/50',
      'bg-rose-50 text-rose-600 border-rose-200 dark:bg-rose-900/40 dark:text-rose-400 dark:border-rose-800/50',
      'bg-indigo-50 text-indigo-600 border-indigo-200 dark:bg-indigo-900/40 dark:text-indigo-400 dark:border-indigo-800/50',
      'bg-teal-50 text-teal-600 border-teal-200 dark:bg-teal-900/40 dark:text-teal-400 dark:border-teal-800/50',
      'bg-orange-50 text-orange-600 border-orange-200 dark:bg-orange-900/40 dark:text-orange-400 dark:border-orange-800/50'
    ];

    // ==========================================
    // BACK BUTTON INTERCEPT (History API Fix)
    // ==========================================
    window.addEventListener('popstate', (event) => {
      // If the back button is pressed, hide any open modals
      const reader = document.getElementById('readerModal');
      const settings = document.getElementById('settingsModal');
      
      if (reader.classList.contains('flex')) {
        reader.classList.add('hidden');
        reader.classList.remove('flex');
        document.body.style.overflow = 'auto';
      }
      if (settings.classList.contains('flex') || !settings.classList.contains('hidden')) {
        settings.classList.add('hidden');
        settings.classList.remove('flex');
      }
    });

    function toggleTheme() {
      const html = document.documentElement;
      if (html.classList.contains('dark')) {
        html.classList.remove('dark');
        localStorage.setItem('feedtile_theme', 'light');
        updateThemeUI('light');
      } else {
        html.classList.add('dark');
        localStorage.setItem('feedtile_theme', 'dark');
        updateThemeUI('dark');
      }
    }

    function updateThemeUI(theme) {
      document.getElementById('themeIcon').innerText = theme === 'dark' ? '🌙' : '☀️';
      document.getElementById('themeText').innerText = theme === 'dark' ? 'Dark' : 'Light';
    }

    if (document.documentElement.classList.contains('dark')) updateThemeUI('dark'); else updateThemeUI('light');

    function openSettings() { 
      history.pushState({ modal: 'settings' }, '', '#settings'); // Create fake history state
      document.getElementById('settingsModal').classList.remove('hidden'); 
      renderSettingsFeeds(); 
    }
    function closeSettings() { history.back(); } // Trigger native popstate
    function toggleMenu() { document.getElementById('addFeedSection').classList.toggle('hidden'); }

    function renderSettingsFeeds() {
      const list = document.getElementById('settingsFeedList');
      if (feeds.length === 0) {
        list.innerHTML = `<li class="text-sm text-slate-500 dark:text-slate-400 italic text-center py-4 border border-dashed border-slate-300 dark:border-slate-700 rounded-xl">No sources added yet.</li>`;
        return;
      }
      list.innerHTML = feeds.map((f, index) => `
        <li class="flex justify-between items-center p-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl shadow-sm">
          <div class="overflow-hidden">
            <div class="text-[10px] font-bold text-blue-500 uppercase">${f.category}</div>
            <div class="text-sm font-semibold text-slate-800 dark:text-slate-200 truncate">${f.url.replace(/^https?:\/\//, '')}</div>
          </div>
          <button onclick="removeFeed(${index})" class="ml-4 p-2 text-rose-500 bg-rose-50 hover:bg-rose-100 dark:bg-rose-900/30 dark:hover:bg-rose-900/50 rounded-lg transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
          </button>
        </li>
      `).join('');
    }

    function removeFeed(index) {
      if(confirm("Stop tracking this source?")) {
        feeds.splice(index, 1);
        localStorage.setItem('feedtile_feeds', JSON.stringify(feeds));
        renderSettingsFeeds();
        const remainingCategories = [...new Set(feeds.map(f => f.category))];
        if (!remainingCategories.includes(currentFilter) && currentFilter !== 'Saved') {
            currentFilter = 'All'; currentSourceFilter = 'All';
        }
        loadFeeds();
      }
    }

    function getColorMap() {
      const uniqueCategories = [...new Set(feeds.map(f => f.category))];
      const map = {};
      uniqueCategories.forEach((cat, index) => { map[cat] = colorPalette[index % colorPalette.length]; });
      return map;
    }

    async function loadFeeds() {
      const container = document.getElementById('feedContainer');
      container.innerHTML = `
        <div class="col-span-full py-20 flex flex-col items-center justify-center space-y-6">
          <div class="relative w-20 h-20">
            <div class="absolute inset-0 bg-blue-500 rounded-2xl animate-ping opacity-20"></div>
            <img src="icon.svg" class="relative w-full h-full rounded-2xl shadow-lg animate-pulse" alt="Loading...">
          </div>
          <div class="flex flex-col items-center space-y-2">
            <p class="text-lg font-bold text-slate-700 dark:text-slate-300">Fetching Stories...</p>
            <p class="text-xs text-slate-500 dark:text-slate-400">Checking your sources</p>
          </div>
        </div>
      `;
      globalStories = []; 

      for (const feed of feeds) {
        try {
          let cleanUrl = feed.url.startsWith('http') ? feed.url : 'https://' + feed.url;
          const domain = new URL(cleanUrl).hostname;
          const res = await fetch(PROXY_URL + encodeURIComponent(feed.url));
          const text = await res.text();
          const xml = new window.DOMParser().parseFromString(text, "text/xml");
          const siteTitleNode = xml.querySelector("channel > title, feed > title");
          const siteName = siteTitleNode ? siteTitleNode.textContent : domain.replace('www.', '');
          const items = Array.from(xml.querySelectorAll("item, entry")).slice(0, 15);
          
          items.forEach(item => {
            const title = item.querySelector("title")?.textContent || "No Title";
            const linkNode = item.querySelector("link");
            const link = linkNode?.getAttribute("href") || linkNode?.textContent || "#";
            const pubDate = item.querySelector("pubDate, published, updated")?.textContent;
            
            let content = item.querySelector("encoded")?.textContent || 
                          item.getElementsByTagNameNS('*', 'encoded')[0]?.textContent || 
                          item.querySelector("content")?.textContent || 
                          item.querySelector("description")?.textContent || 
                          "Content not provided in feed.";

            // Strip basic HTML tags from summary string to check actual text length
            const plainTextContent = content.replace(/<[^>]*>?/gm, '');
            const isFullArticle = plainTextContent.length > 500; // If it's short, it's just a summary
            
            globalStories.push({ 
              id: btoa(link).slice(0, 20),
              title, link, date: new Date(pubDate), category: feed.category, siteName, domain, content, isFullArticle
            });
          });
        } catch (e) { console.error(`Failed to load ${feed.url}`); }
      }
      globalStories.sort((a, b) => b.date - a.date);
      renderCategories(); renderSources(); renderTiles();
    }

    function isSaved(storyId) { return savedArticles.some(article => article.id === storyId); }

    function toggleSave(story, event) {
      if (event) event.stopPropagation(); 
      if (isSaved(story.id)) { savedArticles = savedArticles.filter(a => a.id !== story.id); } 
      else { savedArticles.push(story); }
      localStorage.setItem('feedtile_saved', JSON.stringify(savedArticles));
      
      renderTiles();
      if (document.getElementById('readerModal').classList.contains('flex')) { updateReaderSaveButton(story); }
    }

    // ==========================================
    // LEVEL 2: Readability Extraction Engine
    // ==========================================
    async function openReader(story) {
      history.pushState({ modal: 'reader' }, '', '#article'); // Create fake history state for Android back swipe
      
      document.getElementById('readerScrollArea').scrollTop = 0; // Reset scroll position
      document.getElementById('readerTitle').innerText = story.title;
      document.getElementById('readerSiteName').innerText = story.siteName;
      document.getElementById('readerDate').innerText = isNaN(new Date(story.date)) ? '' : new Date(story.date).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
      document.getElementById('readerLogo').src = `https://s2.googleusercontent.com/s2/favicons?domain=${story.domain}&sz=64`;
      
      const contentDiv = document.getElementById('readerContent');
      const pill = document.getElementById('readerLoadingPill');
      const footer = document.getElementById('readerFooter');
      
      document.getElementById('readerExternalLink').href = story.link;
      document.getElementById('readerFooterLink').href = story.link;

      updateReaderSaveButton(story);
      document.getElementById('readerSaveBtn').onclick = () => toggleSave(story);

      document.body.style.overflow = 'hidden';
      document.getElementById('readerModal').classList.remove('hidden');
      document.getElementById('readerModal').classList.add('flex');

      // If we already have the full article from the RSS feed, display it instantly.
      if (story.isFullArticle) {
        contentDiv.innerHTML = story.content;
        pill.classList.add('hidden');
        pill.classList.remove('flex');
        footer.classList.add('hidden');
      } 
      // If it's just a summary, try to use Readability to fetch the rest
      else {
        contentDiv.innerHTML = story.content; // Show summary while loading
        pill.classList.remove('hidden');
        pill.classList.add('flex');
        footer.classList.add('hidden');

        try {
          // Ask our worker for the raw HTML of the article
          const res = await fetch(PROXY_URL + encodeURIComponent(story.link) + '&mode=html');
          const rawHtml = await res.text();
          
          // Parse it using Mozilla Readability
          const doc = new DOMParser().parseFromString(rawHtml, 'text/html');
          const reader = new Readability(doc);
          const article = reader.parse();

          // If extraction was successful and it actually looks like an article
          if (article && article.textContent.length > 500) {
            contentDiv.innerHTML = article.content;
            contentDiv.classList.add('fade-in'); // Add smooth fade
            setTimeout(() => contentDiv.classList.remove('fade-in'), 500);
            pill.classList.add('hidden');
            pill.classList.remove('flex');
          } else {
            throw new Error("Readability could not find article content.");
          }
        } catch (error) {
          console.warn("Extraction failed, falling back to summary.");
          pill.classList.add('hidden');
          pill.classList.remove('flex');
          footer.classList.remove('hidden'); // Show the "Read on Web" button
        }
      }
    }

    function closeReader() { history.back(); } // Trigger native popstate

    function updateReaderSaveButton(story) {
      const btn = document.getElementById('readerSaveBtn');
      const icon = document.getElementById('readerSaveIcon');
      if (isSaved(story.id)) {
        icon.innerText = '★'; icon.classList.add('text-yellow-500'); btn.classList.add('ring-2', 'ring-yellow-400', 'ring-offset-1');
      } else {
        icon.innerText = '☆'; icon.classList.remove('text-yellow-500'); btn.classList.remove('ring-2', 'ring-yellow-400', 'ring-offset-1');
      }
    }

    function filterCategory(category) {
      currentFilter = category; currentSourceFilter = 'All'; 
      renderCategories(); renderSources(); renderTiles();      
    }
    function filterSource(sourceName) { currentSourceFilter = sourceName; renderTiles(); }

    function renderTiles() {
      const container = document.getElementById('feedContainer');
      container.innerHTML = '';
      let baseStories = currentFilter === 'Saved' ? savedArticles : globalStories;
      let filteredStories = baseStories;
      if (currentFilter !== 'All' && currentFilter !== 'Saved') { filteredStories = filteredStories.filter(story => story.category === currentFilter); }
      if (currentSourceFilter !== 'All') { filteredStories = filteredStories.filter(story => story.siteName === currentSourceFilter); }

      if (filteredStories.length === 0) {
        let emptyMessage = currentFilter === 'Saved' ? "You haven't saved any stories for later." : "Add some feeds or adjust your filters!";
        container.innerHTML = `
          <div class="col-span-full mt-10 p-8 text-center bg-white dark:bg-slate-800 rounded-2xl border-2 border-dashed border-slate-300 dark:border-slate-700">
            <h3 class="text-lg font-bold text-slate-700 dark:text-slate-300 mb-2">No Stories Here</h3>
            <p class="text-slate-500 text-sm">${emptyMessage}</p>
          </div>`;
        return;
      }

      const colorMap = getColorMap();

      filteredStories.forEach(story => {
        const isRead = readArticles.includes(story.link) ? 'read' : 'bg-white shadow-sm dark:bg-slate-800 dark:shadow-lg border-slate-200 dark:border-slate-700';
        const dateStr = isNaN(new Date(story.date)) ? '' : new Date(story.date).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
        const logoUrl = `https://s2.googleusercontent.com/s2/favicons?domain=${story.domain}&sz=64`;
        const badgeColor = colorMap[story.category] || 'bg-slate-100 text-slate-600 border-slate-200 dark:bg-slate-700 dark:text-slate-300 dark:border-slate-600';
        const savedIcon = isSaved(story.id) ? '★' : '☆';
        const savedColor = isSaved(story.id) ? 'text-yellow-500' : 'text-slate-300 dark:text-slate-600 hover:text-slate-500 dark:hover:text-slate-400';

        const tile = document.createElement('div');
        tile.className = `tile block p-5 border rounded-2xl cursor-pointer flex flex-col h-full ${isRead} relative group`;
        
        tile.onclick = () => { markAsRead(story.link, tile); openReader(story); };

        tile.innerHTML = `
          <div class="flex justify-between items-start mb-3">
            <span class="text-[10px] font-bold px-2 py-1 rounded-md uppercase tracking-wider border ${badgeColor}">${story.category}</span>
            <span class="text-xs text-slate-400 dark:text-slate-500 font-medium pr-6">${dateStr}</span>
          </div>
          <button id="saveBtn-${story.id}" class="absolute top-4 right-4 text-xl ${savedColor} transition-transform active:scale-125 focus:outline-none z-10">${savedIcon}</button>
          <h3 class="text-base font-bold text-slate-900 dark:text-slate-100 leading-snug flex-1 mb-4 pr-4">${story.title}</h3>
          <div class="flex items-center gap-2 mt-auto pt-3 border-t border-slate-100 dark:border-slate-700/50">
            <img src="${logoUrl}" alt="${story.siteName} logo" class="w-5 h-5 rounded-full bg-slate-200 object-contain" onerror="this.style.display='none'">
            <span class="text-xs font-semibold text-slate-500 dark:text-slate-400 truncate flex-1">${story.siteName}</span>
            ${!story.isFullArticle ? '<span class="text-[9px] uppercase tracking-wider font-bold text-slate-400 dark:text-slate-500">Summary</span>' : ''}
          </div>
        `;
        container.appendChild(tile);
        document.getElementById(`saveBtn-${story.id}`).onclick = (e) => toggleSave(story, e);
      });
    }

    function renderCategories() {
      const container = document.getElementById('categoryBadges');
      const uniqueCategories = [...new Set(feeds.map(f => f.category))];
      const colorMap = getColorMap();
      
      const allActiveStyle = currentFilter === 'All' 
        ? 'bg-slate-800 text-white border-slate-800 dark:bg-blue-600 dark:border-transparent dark:text-white ring-2 ring-slate-400 dark:ring-blue-500/50 ring-offset-1 dark:ring-offset-2 dark:ring-offset-slate-900 shadow-md' 
        : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50 dark:bg-slate-800 dark:border-slate-700 dark:text-slate-300 dark:hover:bg-slate-700';
        
      const savedActiveStyle = currentFilter === 'Saved' 
        ? 'bg-yellow-50 text-yellow-700 border-yellow-300 ring-2 ring-yellow-400 dark:bg-yellow-900/30 dark:text-yellow-400 dark:border-yellow-700 dark:ring-yellow-600 ring-offset-1 dark:ring-offset-2 dark:ring-offset-slate-900 shadow-md scale-105' 
        : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50 dark:bg-slate-800 dark:border-slate-700 dark:text-slate-300 dark:hover:bg-slate-700';

      let html = `<button onclick="filterCategory('All')" class="whitespace-nowrap px-4 py-1.5 border text-xs font-bold rounded-full transition-all active:scale-95 ${allActiveStyle}">All</button>`;
      html += `<button onclick="filterCategory('Saved')" class="whitespace-nowrap px-4 py-1.5 border text-xs font-bold rounded-full transition-all active:scale-95 flex items-center gap-1 ${savedActiveStyle}"><span class="text-yellow-500 text-sm leading-none">★</span> Read Later</button>`;

      uniqueCategories.forEach(c => {
        const isActive = currentFilter === c;
        const baseColor = colorMap[c];
        const activeStyle = isActive 
          ? 'ring-2 ring-blue-400 dark:ring-slate-500 ring-offset-1 dark:ring-offset-2 dark:ring-offset-slate-900 opacity-100 scale-105 shadow-sm dark:shadow-md' 
          : 'opacity-70 hover:opacity-100 hover:scale-105';

        html += `<button onclick="filterCategory('${c}')" class="whitespace-nowrap px-4 py-1.5 border text-xs font-bold rounded-full transition-all active:scale-95 ${baseColor} ${activeStyle}">${c}</button>`;
      });
      container.innerHTML = html;
    }

    function renderSources() {
      const dropdown = document.getElementById('sourceFilterDropdown');
      let baseStories = currentFilter === 'Saved' ? savedArticles : globalStories;
      let relevantStories = baseStories;
      if (currentFilter !== 'All' && currentFilter !== 'Saved') { relevantStories = baseStories.filter(s => s.category === currentFilter); }
      
      const uniqueSources = [...new Set(relevantStories.map(s => s.siteName))].sort();

      if(uniqueSources.length === 0) {
          dropdown.innerHTML = `<option value="All">No sources available</option>`;
          dropdown.disabled = true; dropdown.parentElement.classList.add('hidden'); return;
      }

      dropdown.disabled = false; dropdown.parentElement.classList.remove('hidden');
      let html = `<option value="All">All Sources (${uniqueSources.length})</option>`;
      uniqueSources.forEach(source => {
        const isSelected = currentSourceFilter === source ? 'selected' : '';
        html += `<option value="${source}" ${isSelected}>${source}</option>`;
      });
      dropdown.innerHTML = html;
    }

    function addFeed() {
      const url = document.getElementById('feedUrl').value.trim();
      const category = document.getElementById('feedCategory').value.trim() || 'General';
      if (!url) return;
      if (feeds.some(f => f.url === url)) { alert("You are already following this source!"); return; }

      feeds.push({ url, category });
      localStorage.setItem('feedtile_feeds', JSON.stringify(feeds));
      document.getElementById('feedUrl').value = ''; document.getElementById('feedCategory').value = '';
      toggleMenu(); loadFeeds();
    }

    function markAsRead(link, element) {
      if (!readArticles.includes(link)) {
        readArticles.push(link);
        if (readArticles.length > 500) readArticles.shift(); 
        localStorage.setItem('feedtile_read', JSON.stringify(readArticles));
        element.classList.add('read');
        element.classList.remove('bg-white', 'shadow-sm', 'dark:bg-slate-800', 'dark:shadow-lg');
      }
    }

    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    loadFeeds();
  </script>
</body>
</html>
