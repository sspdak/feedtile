<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FeedTile</title>
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .tile { transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .tile:active { transform: scale(0.98); }
    .read { opacity: 0.6; filter: grayscale(30%); border-color: #e2e8f0; }
    .read h3 { color: #64748b; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">

  <header class="bg-white border-b border-slate-200 sticky top-0 z-20 shadow-sm">
    <div class="p-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold flex items-center gap-2 text-blue-600 cursor-pointer" onclick="filterCategory('All')">
        <img src="icon.svg" class="w-8 h-8 rounded shadow-sm" alt="Logo"> FeedTile
      </h1>
      <button onclick="toggleMenu()" class="p-2 text-slate-600 bg-slate-100 rounded-lg hover:bg-slate-200 transition">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
        </svg>
      </button>
    </div>

    <div id="addFeedSection" class="hidden px-4 pb-4 bg-slate-50 border-t border-slate-200 pt-4">
      <h2 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">Add a New Source</h2>
      <div class="flex flex-col md:flex-row gap-3">
        <input type="url" id="feedUrl" placeholder="Website URL (e.g., theverge.com)" class="flex-1 p-3 border border-slate-300 rounded-lg bg-white text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
        <input type="text" id="feedCategory" placeholder="Category (e.g., Tech)" class="w-full md:w-48 p-3 border border-slate-300 rounded-lg bg-white text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
        <button onclick="addFeed()" class="bg-blue-600 text-white p-3 rounded-lg text-sm font-bold hover:bg-blue-700 transition shadow-sm">Save Feed</button>
      </div>
    </div>
  </header>

  <main class="flex-1 p-4 md:p-6 lg:p-8 h-full overflow-y-auto w-full max-w-7xl mx-auto">
    <div class="mb-6 flex gap-2 overflow-x-auto pb-2 scrollbar-hide" id="categoryBadges">
      </div>

    <div id="feedContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6">
      </div>
  </main>

  <script>
    const PROXY_URL = 'https://feedtile.ewing-jacob.workers.dev/?url=';
    
    // Application State
    let feeds = JSON.parse(localStorage.getItem('feedtile_feeds')) || [];
    let readArticles = JSON.parse(localStorage.getItem('feedtile_read')) || [];
    let globalStories = []; // Holds all fetched stories in memory
    let currentFilter = 'All'; // Tracks the active category

    // Color Palette for Categories
    const colorPalette = [
      'bg-blue-50 text-blue-600 border-blue-200',
      'bg-emerald-50 text-emerald-600 border-emerald-200',
      'bg-purple-50 text-purple-600 border-purple-200',
      'bg-amber-50 text-amber-600 border-amber-200',
      'bg-rose-50 text-rose-600 border-rose-200',
      'bg-indigo-50 text-indigo-600 border-indigo-200',
      'bg-teal-50 text-teal-600 border-teal-200',
      'bg-orange-50 text-orange-600 border-orange-200'
    ];

    function toggleMenu() {
      const menu = document.getElementById('addFeedSection');
      menu.classList.toggle('hidden');
    }

    // Helper: Maps categories to specific colors consistently
    function getColorMap() {
      const uniqueCategories = [...new Set(feeds.map(f => f.category))];
      const map = {};
      uniqueCategories.forEach((cat, index) => {
        map[cat] = colorPalette[index % colorPalette.length];
      });
      return map;
    }

    async function loadFeeds() {
      const container = document.getElementById('feedContainer');
      container.innerHTML = `<div class="col-span-full py-12 flex justify-center"><div class="animate-pulse flex space-x-4"><div class="flex-1 space-y-4 py-1"><div class="h-4 bg-slate-300 rounded w-3/4"></div><div class="space-y-2"><div class="h-4 bg-slate-300 rounded"></div><div class="h-4 bg-slate-300 rounded w-5/6"></div></div></div></div></div>`;
      
      globalStories = []; // Reset stories

      for (const feed of feeds) {
        try {
          let cleanUrl = feed.url.startsWith('http') ? feed.url : 'https://' + feed.url;
          const domain = new URL(cleanUrl).hostname;

          const res = await fetch(PROXY_URL + encodeURIComponent(feed.url));
          const text = await res.text();
          const xml = new window.DOMParser().parseFromString(text, "text/xml");
          
          const siteTitleNode = xml.querySelector("channel > title, feed > title");
          const siteName = siteTitleNode ? siteTitleNode.textContent : domain.replace('www.', '');

          const items = Array.from(xml.querySelectorAll("item, entry")).slice(0, 12);
          
          items.forEach(item => {
            const title = item.querySelector("title")?.textContent || "No Title";
            const linkNode = item.querySelector("link");
            const link = linkNode?.getAttribute("href") || linkNode?.textContent || "#";
            const pubDate = item.querySelector("pubDate, published, updated")?.textContent;
            
            globalStories.push({ 
              title, 
              link, 
              date: new Date(pubDate), 
              category: feed.category, 
              siteName: siteName,
              domain: domain
            });
          });
        } catch (e) {
          console.error(`Failed to load ${feed.url}`);
        }
      }

      globalStories.sort((a, b) => b.date - a.date);
      
      // Render UI based on current state
      renderCategories();
      renderTiles();
    }

    function filterCategory(category) {
      currentFilter = category;
      renderCategories(); // Re-render badges to show active state
      renderTiles();      // Re-render grid to show filtered tiles
    }

    function renderTiles() {
      const container = document.getElementById('feedContainer');
      container.innerHTML = '';

      // Filter logic
      const filteredStories = currentFilter === 'All' 
        ? globalStories 
        : globalStories.filter(story => story.category === currentFilter);

      if (filteredStories.length === 0) {
        container.innerHTML = `
          <div class="col-span-full mt-10 p-8 text-center bg-white rounded-2xl border-2 border-dashed border-slate-300">
            <h3 class="text-lg font-bold text-slate-700 mb-2">No Stories Here</h3>
            <p class="text-slate-500 text-sm">Add some feeds to this category, or check back later!</p>
          </div>`;
        return;
      }

      const colorMap = getColorMap();

      filteredStories.forEach(story => {
        const isRead = readArticles.includes(story.link) ? 'read bg-slate-50' : 'bg-white shadow-sm';
        const dateStr = isNaN(story.date) ? '' : story.date.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
        const logoUrl = `https://s2.googleusercontent.com/s2/favicons?domain=${story.domain}&sz=64`;
        
        // Grab the assigned color for this story's category
        const badgeColor = colorMap[story.category] || 'bg-slate-100 text-slate-600 border-slate-200';

        const tile = document.createElement('a');
        tile.href = story.link;
        tile.target = "_blank";
        tile.className = `tile block p-5 border border-slate-200 rounded-2xl cursor-pointer flex flex-col h-full ${isRead}`;
        tile.onclick = (e) => markAsRead(story.link, tile);

        tile.innerHTML = `
          <div class="flex justify-between items-start mb-3">
            <span class="text-[10px] font-bold px-2 py-1 rounded-md uppercase tracking-wider border ${badgeColor}">${story.category}</span>
            <span class="text-xs text-slate-400 font-medium">${dateStr}</span>
          </div>
          
          <h3 class="text-base font-bold text-slate-900 leading-snug flex-1 mb-4">${story.title}</h3>
          
          <div class="flex items-center gap-2 mt-auto pt-3 border-t border-slate-100">
            <img src="${logoUrl}" alt="${story.siteName} logo" class="w-5 h-5 rounded-full bg-slate-100 object-contain" onerror="this.style.display='none'">
            <span class="text-xs font-semibold text-slate-500 truncate">${story.siteName}</span>
          </div>
        `;
        container.appendChild(tile);
      });
    }

    function renderCategories() {
      const container = document.getElementById('categoryBadges');
      const uniqueCategories = [...new Set(feeds.map(f => f.category))];
      const colorMap = getColorMap();
      
      if(uniqueCategories.length === 0) {
          container.innerHTML = '';
          return;
      }

      // "All" Button
      const allActiveStyle = currentFilter === 'All' 
        ? 'bg-slate-800 text-white ring-2 ring-slate-400 ring-offset-1' 
        : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50';
        
      let html = `<button onclick="filterCategory('All')" class="whitespace-nowrap px-4 py-1.5 border text-xs font-bold rounded-full transition-all active:scale-95 ${allActiveStyle}">All</button>`;

      // Dynamic Category Buttons
      uniqueCategories.forEach(c => {
        const isActive = currentFilter === c;
        const baseColor = colorMap[c];
        
        // Add a visual "ring" if the category is the active filter
        const activeStyle = isActive 
          ? 'ring-2 ring-blue-400 ring-offset-1 opacity-100 scale-105 shadow-sm' 
          : 'opacity-70 hover:opacity-100 hover:scale-105';

        html += `<button onclick="filterCategory('${c}')" class="whitespace-nowrap px-4 py-1.5 border text-xs font-bold rounded-full transition-all active:scale-95 ${baseColor} ${activeStyle}">${c}</button>`;
      });

      container.innerHTML = html;
    }

    function addFeed() {
      const url = document.getElementById('feedUrl').value.trim();
      const category = document.getElementById('feedCategory').value.trim() || 'General';
      if (!url) return;

      if (feeds.some(f => f.url === url)) {
          alert("You are already following this source!");
          return;
      }

      feeds.push({ url, category });
      localStorage.setItem('feedtile_feeds', JSON.stringify(feeds));
      
      document.getElementById('feedUrl').value = '';
      document.getElementById('feedCategory').value = '';
      toggleMenu();
      loadFeeds();
    }

    function markAsRead(link, element) {
      if (!readArticles.includes(link)) {
        readArticles.push(link);
        if (readArticles.length > 500) readArticles.shift(); 
        localStorage.setItem('feedtile_read', JSON.stringify(readArticles));
        
        element.classList.add('read', 'bg-slate-50');
        element.classList.remove('bg-white', 'shadow-sm');
      }
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    loadFeeds();
  </script>
</body>
</html>
