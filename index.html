<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FeedTile</title>
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Smooth transitions for the tile hover effects */
    .tile { transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .tile:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    /* Visual indicator for read articles */
    .read { opacity: 0.55; filter: grayscale(50%); }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex">

  <aside class="w-64 bg-white border-r border-slate-200 p-6 hidden md:block">
    <h1 class="text-2xl font-bold flex items-center gap-2 mb-8 text-blue-600">
      <img src="icon.svg" class="w-8 h-8 rounded" alt="Logo"> FeedTile
    </h1>
    
    <div class="mb-8">
      <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-4">Add New Site</h2>
      <input type="url" id="feedUrl" placeholder="https://site.com/rss" class="w-full mb-2 p-2 border rounded bg-slate-50 text-sm">
      <input type="text" id="feedCategory" placeholder="Category (e.g. Tech)" class="w-full mb-3 p-2 border rounded bg-slate-50 text-sm">
      <button onclick="addFeed()" class="w-full bg-blue-600 text-white p-2 rounded text-sm font-semibold hover:bg-blue-700 transition">Add Feed</button>
    </div>

    <div>
      <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-4">Categories</h2>
      <ul id="categoryList" class="space-y-2 text-sm font-medium">
        </ul>
    </div>
  </aside>

  <main class="flex-1 p-6 lg:p-10 h-screen overflow-y-auto">
    <header class="flex justify-between items-center mb-8 md:hidden">
      <h1 class="text-2xl font-bold text-blue-600">FeedTile</h1>
    </header>
    
    <div id="feedContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
      </div>
  </main>

  <script>
    // Configuration
    const PROXY_URL = 'https://feedtile.ewing-jacob.workers.dev/';
    
    // State
    let feeds = JSON.parse(localStorage.getItem('feedtile_feeds')) || [];
    let readArticles = JSON.parse(localStorage.getItem('feedtile_read')) || [];

    // Initialize
    async function loadFeeds() {
      const container = document.getElementById('feedContainer');
      container.innerHTML = '<p class="col-span-full text-slate-500">Fetching your tiles...</p>';
      
      let allStories = [];

      for (const feed of feeds) {
        try {
          const res = await fetch(PROXY_URL + encodeURIComponent(feed.url));
          const text = await res.text();
          const xml = new window.DOMParser().parseFromString(text, "text/xml");
          
          // Handle both RSS <item> and Atom <entry>
          const items = Array.from(xml.querySelectorAll("item, entry")).slice(0, 10);
          
          items.forEach(item => {
            const title = item.querySelector("title")?.textContent || "No Title";
            // Atom uses <link href="...">, RSS uses <link>URL</link>
            const linkNode = item.querySelector("link");
            const link = linkNode?.getAttribute("href") || linkNode?.textContent || "#";
            const pubDate = item.querySelector("pubDate, published, updated")?.textContent;
            
            allStories.push({ title, link, date: new Date(pubDate), category: feed.category, source: feed.url });
          });
        } catch (e) {
          console.error(`Failed to load ${feed.url}`);
        }
      }

      // Sort by newest first
      allStories.sort((a, b) => b.date - a.date);
      renderTiles(allStories);
      renderCategories();
    }

    function renderTiles(stories) {
      const container = document.getElementById('feedContainer');
      container.innerHTML = '';

      if (stories.length === 0) {
        container.innerHTML = `<div class="col-span-full p-10 text-center bg-white rounded-xl border border-dashed border-slate-300">
          <p class="text-slate-500">No feeds added yet. Add an RSS URL in the sidebar!</p>
        </div>`;
        return;
      }

      stories.forEach(story => {
        const isRead = readArticles.includes(story.link) ? 'read' : '';
        const dateStr = isNaN(story.date) ? '' : story.date.toLocaleDateString();

        const tile = document.createElement('a');
        tile.href = story.link;
        tile.target = "_blank";
        tile.className = `tile block p-5 bg-white border border-slate-200 rounded-xl cursor-pointer flex flex-col h-full ${isRead}`;
        tile.onclick = (e) => markAsRead(story.link, tile);

        tile.innerHTML = `
          <div class="text-xs font-bold text-blue-600 mb-2 uppercase tracking-wide">${story.category}</div>
          <h3 class="text-lg font-bold text-slate-800 leading-snug flex-1">${story.title}</h3>
          <div class="mt-4 text-xs text-slate-400 font-medium">${dateStr}</div>
        `;
        container.appendChild(tile);
      });
    }

    function renderCategories() {
      const list = document.getElementById('categoryList');
      const categories = [...new Set(feeds.map(f => f.category))];
      list.innerHTML = categories.map(c => `<li class="text-slate-600 cursor-pointer hover:text-blue-600 transition">${c}</li>`).join('');
    }

    function addFeed() {
      const url = document.getElementById('feedUrl').value;
      const category = document.getElementById('feedCategory').value || 'General';
      if (!url) return;

      feeds.push({ url, category });
      localStorage.setItem('feedtile_feeds', JSON.stringify(feeds));
      
      document.getElementById('feedUrl').value = '';
      document.getElementById('feedCategory').value = '';
      loadFeeds();
    }

    function markAsRead(link, element) {
      if (!readArticles.includes(link)) {
        readArticles.push(link);
        // Keep array size manageable
        if (readArticles.length > 500) readArticles.shift(); 
        localStorage.setItem('feedtile_read', JSON.stringify(readArticles));
        element.classList.add('read');
      }
    }

    // Register Service Worker for PWA installation
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    // Boot
    loadFeeds();
  </script>
</body>
</html>
